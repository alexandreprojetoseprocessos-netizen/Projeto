name: CI

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run --workspace apps/api build
      - run: npm run --workspace apps/front build

  e2e-preflight:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        shell: bash
        run: |
          if [[ -n "$DATABASE_URL" && -n "$SUPABASE_URL" && -n "$SUPABASE_ANON_KEY" && -n "$SUPABASE_SERVICE_ROLE_KEY" && -n "$JWT_SECRET" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    runs-on: ubuntu-latest
    needs: [build, e2e-preflight]
    if: ${{ needs.e2e-preflight.outputs.enabled == 'true' }}
    env:
      NODE_ENV: test
      FRONTEND_URL: http://127.0.0.1:5173
      E2E_API_BASE_URL: http://127.0.0.1:4000
      E2E_WEB_BASE_URL: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm --workspace apps/front exec playwright install --with-deps chromium
      - run: npm run test:e2e
