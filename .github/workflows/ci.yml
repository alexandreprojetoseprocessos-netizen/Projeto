name: CI

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run --workspace apps/api build
      - run: npm run --workspace apps/front build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.DATABASE_URL != '' && secrets.SUPABASE_URL != '' && secrets.SUPABASE_ANON_KEY != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.JWT_SECRET != '' }}
    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      FRONTEND_URL: http://127.0.0.1:5173
      E2E_API_BASE_URL: http://127.0.0.1:4000
      E2E_WEB_BASE_URL: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm --workspace apps/front exec playwright install --with-deps chromium
      - run: npm run test:e2e
